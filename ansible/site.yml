---
# Main orchestration playbook for Kubernetes cluster setup
- name: Setup Kubernetes Cluster on Proxmox VMs
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display cluster setup information
      debug:
        msg: |
          Starting Kubernetes cluster setup with the following configuration:
          - Manager: {{ groups['k8s_manager'][0] }}
          - Nodes: {{ groups['k8s_nodes'] | join(', ') }}
          - Kubernetes Version: {{ kubernetes_version }}

# Phase 1: Common Kubernetes preparation on all nodes
- import_playbook: playbooks/k8s-common.yml

# Phase 2: Initialize Kubernetes control plane on manager
- import_playbook: playbooks/k8s-manager.yml

# Phase 3: Join worker nodes to the cluster
- import_playbook: playbooks/k8s-nodes.yml

# Phase 4: Install and configure Helm
- import_playbook: playbooks/k8s-helm.yml

# Phase 5: Deploy nginx-ingress-controller
- import_playbook: playbooks/k8s-ingress.yml

# Phase 6: Final cluster validation
- name: Validate Kubernetes Cluster
  hosts: k8s_manager
  gather_facts: false
  tasks:
    - name: Wait for all nodes to be ready
      shell: kubectl get nodes --no-headers | grep -v Ready | wc -l
      register: not_ready_nodes
      until: not_ready_nodes.stdout == "0"
      retries: 30
      delay: 10
      
    - name: Display cluster status
      shell: kubectl get nodes -o wide
      register: cluster_status
      
    - name: Show final cluster status
      debug:
        msg: |
          Kubernetes cluster setup completed successfully!
          {{ cluster_status.stdout }}