---
# nginx-ingress-controller Helm values configuration
# Optimized for Proxmox VM deployment with NodePort service

controller:
  # Controller configuration
  name: controller
  image:
    registry: registry.k8s.io
    image: ingress-nginx/controller
    tag: "v1.9.4"
    digest: ""
    pullPolicy: IfNotPresent
    
  # Service configuration for external access
  service:
    enabled: true
    type: NodePort
    ports:
      http: 80
      https: 443
    targetPorts:
      http: http
      https: https
    nodePorts:
      http: 30080
      https: 30443
    external:
      enabled: true
    
  # Ingress class configuration
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
    controllerValue: "k8s.io/ingress-nginx"
    
  # Controller replica configuration
  replicaCount: 2
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
      
  # Node selector for manager node deployment
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
    
  # Tolerations to allow scheduling on control plane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
      
  # Affinity rules
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - ingress-nginx
            topologyKey: kubernetes.io/hostname
            
  # Configuration for ingress controller
  config:
    # Enable real IP forwarding
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    
    # SSL configuration
    ssl-redirect: "true"
    force-ssl-redirect: "false"
    ssl-protocols: "TLSv1.2 TLSv1.3"
    
    # Performance tuning
    worker-processes: "auto"
    worker-connections: "1024"
    keep-alive-requests: "100"
    
    # Logging
    log-format-upstream: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $request_length $request_time [$proxy_upstream_name] [$proxy_alternative_upstream_name] $upstream_addr $upstream_response_length $upstream_response_time $upstream_status $req_id'
    access-log-path: "/var/log/nginx/access.log"
    error-log-path: "/var/log/nginx/error.log"
    
  # Metrics configuration
  metrics:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "10254"
    serviceMonitor:
      enabled: false
      
  # Admission webhooks
  admissionWebhooks:
    enabled: true
    failurePolicy: Fail
    port: 8443
    certificate: "/usr/local/certificates/cert"
    key: "/usr/local/certificates/key"
    namespaceSelector: {}
    objectSelector: {}
    
  # Lifecycle hooks
  lifecycle:
    preStop:
      exec:
        command:
          - /wait-shutdown
          
# Default backend configuration
defaultBackend:
  enabled: true
  name: defaultbackend
  image:
    registry: registry.k8s.io
    image: defaultbackend-amd64
    tag: "1.5"
    pullPolicy: IfNotPresent
    
  replicaCount: 1
  
  resources:
    limits:
      cpu: 10m
      memory: 20Mi
    requests:
      cpu: 10m
      memory: 20Mi
      
  service:
    servicePort: 80
    type: ClusterIP
    
  # Node selector for worker nodes
  nodeSelector: {}
  
  tolerations: []
  
# RBAC configuration
rbac:
  create: true
  scope: false
  
# Service account configuration
serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: true
  
# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 82
  fsGroup: 82
  
# Security context
securityContext:
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: true
  
# Network policy
networkPolicy:
  enabled: false
  
# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  
# Autoscaling (disabled for small cluster)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 50