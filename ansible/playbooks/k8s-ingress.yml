---
# nginx-ingress-controller deployment via Helm
- name: Deploy nginx-ingress-controller
  hosts: k8s_manager
  become: yes
  gather_facts: yes
  
  vars:
    kubeconfig_path: /etc/kubernetes/admin.conf
    helm_binary: "{{ helm_install_dir }}/helm"
    nginx_ingress_namespace: ingress-nginx
    nginx_ingress_chart_version: 4.7.1
    helm_install_dir: /usr/local/bin
    
  tasks:
    - name: Create ingress-nginx namespace
      shell: |
        /usr/local/bin/helm repo update
        kubectl create namespace {{ nginx_ingress_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: namespace_creation
      
    - name: Check if nginx-ingress-controller is already installed
      shell: "/usr/local/bin/helm list -n {{ nginx_ingress_namespace }} -o json"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: helm_list_ingress
      
    - name: Parse Helm list output
      set_fact:
        ingress_installed: "{{ (helm_list_ingress.stdout | from_json) | selectattr('name', 'equalto', 'ingress-nginx') | list | length > 0 }}"
        
    - name: Display ingress controller installation status
      debug:
        msg: "nginx-ingress-controller already installed: {{ ingress_installed }}"
        
    - name: Copy nginx-ingress Helm values file
      copy:
        src: /root/spark-infra/ansible/files/nginx-ingress-values.yml
        dest: /tmp/nginx-ingress-values.yml
        mode: '0644'
        
    - name: Install nginx-ingress-controller via Helm
      shell: |
        /usr/local/bin/helm install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace {{ nginx_ingress_namespace }} \
          --version {{ nginx_ingress_chart_version }} \
          --values /tmp/nginx-ingress-values.yml \
          --wait \
          --timeout 10m
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: helm_install_ingress
      when: not ingress_installed
      
    - name: Upgrade nginx-ingress-controller if already installed
      shell: |
        /usr/local/bin/helm upgrade ingress-nginx ingress-nginx/ingress-nginx \
          --namespace {{ nginx_ingress_namespace }} \
          --version {{ nginx_ingress_chart_version }} \
          --values /tmp/nginx-ingress-values.yml \
          --wait \
          --timeout 10m
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: helm_upgrade_ingress
      when: ingress_installed
      
    - name: Wait for ingress controller pods to be ready
      shell: |
        kubectl wait --namespace {{ nginx_ingress_namespace }} \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=controller \
          --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ingress_pods_ready
      
    - name: Wait for default backend pods to be ready
      shell: |
        kubectl wait --namespace {{ nginx_ingress_namespace }} \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=default-backend \
          --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: backend_pods_ready
      ignore_errors: yes
      
    - name: Get ingress controller service details
      shell: kubectl get service -n {{ nginx_ingress_namespace }} ingress-nginx-controller -o json
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ingress_service_details
      
    - name: Parse service details
      set_fact:
        ingress_service: "{{ ingress_service_details.stdout | from_json }}"
        
    - name: Get ingress controller pods status
      shell: kubectl get pods -n {{ nginx_ingress_namespace }} -l app.kubernetes.io/component=controller -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ingress_pods_status
      
    - name: Get ingress class information
      shell: kubectl get ingressclass -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ingress_class_info
      
    - name: Test ingress controller health endpoint
      uri:
        url: "http://{{ ansible_default_ipv4.address }}:{{ nginx_ingress_node_port_http }}/healthz"
        method: GET
        status_code: 200
      register: health_check
      retries: 5
      delay: 10
      ignore_errors: yes
      
    - name: Create ingress controller validation service
      copy:
        content: |
          apiVersion: v1
          kind: Service
          metadata:
            name: ingress-test-service
            namespace: default
          spec:
            selector:
              app: ingress-test
            ports:
              - protocol: TCP
                port: 80
                targetPort: 8080
            type: ClusterIP
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ingress-test-deployment
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ingress-test
            template:
              metadata:
                labels:
                  app: ingress-test
              spec:
                containers:
                - name: test-app
                  image: nginx:alpine
                  ports:
                  - containerPort: 80
                  resources:
                    limits:
                      cpu: 50m
                      memory: 64Mi
                    requests:
                      cpu: 10m
                      memory: 32Mi
        dest: /tmp/ingress-test-app.yml
        mode: '0644'
        
    - name: Deploy test application for ingress validation
      shell: kubectl apply -f /tmp/ingress-test-app.yml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: test_app_deploy
      
    - name: Wait for test application to be ready
      shell: |
        kubectl wait --for=condition=available deployment/ingress-test-deployment \
          --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: test_app_ready
      
    - name: Create test ingress resource
      copy:
        content: |
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-test
            namespace: default
            annotations:
              nginx.ingress.kubernetes.io/rewrite-target: /
          spec:
            ingressClassName: nginx
            rules:
            - host: test.local
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: ingress-test-service
                      port:
                        number: 80
        dest: /tmp/ingress-test-resource.yml
        mode: '0644'
        
    - name: Apply test ingress resource
      shell: kubectl apply -f /tmp/ingress-test-resource.yml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: test_ingress_apply
      
    - name: Wait for ingress resource to get an address
      shell: |
        kubectl get ingress ingress-test -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ingress_address
      until: ingress_address.stdout != "pending" and ingress_address.stdout != ""
      retries: 10
      delay: 5
      ignore_errors: yes
      
    - name: Get final ingress status
      shell: kubectl get ingress ingress-test -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: final_ingress_status
      
    - name: Display nginx-ingress-controller deployment summary
      debug:
        msg: |
          nginx-ingress-controller deployment completed successfully!
          
          Service Details:
          - Type: {{ ingress_service.spec.type }}
          - HTTP NodePort: {{ ingress_service.spec.ports | selectattr('name', 'equalto', 'http') | map(attribute='nodePort') | first }}
          - HTTPS NodePort: {{ ingress_service.spec.ports | selectattr('name', 'equalto', 'https') | map(attribute='nodePort') | first }}
          
          Controller Pods:
          {{ ingress_pods_status.stdout }}
          
          Ingress Classes:
          {{ ingress_class_info.stdout }}
          
          External Access:
          - HTTP: http://{{ ansible_default_ipv4.address }}:{{ nginx_ingress_node_port_http }}
          - HTTPS: https://{{ ansible_default_ipv4.address }}:{{ nginx_ingress_node_port_https }}
          
          Health Check: {{ "✓ Passed" if health_check.status == 200 else "✗ Failed" }}
          
          Test Ingress Status:
          {{ final_ingress_status.stdout }}
          
    - name: Create ingress controller information ConfigMap
      shell: |
        kubectl create configmap ingress-nginx-info \
          --from-literal=service-type="{{ ingress_service.spec.type }}" \
          --from-literal=http-nodeport="{{ ingress_service.spec.ports | selectattr('name', 'equalto', 'http') | map(attribute='nodePort') | first }}" \
          --from-literal=https-nodeport="{{ ingress_service.spec.ports | selectattr('name', 'equalto', 'https') | map(attribute='nodePort') | first }}" \
          --from-literal=external-ip="{{ ansible_default_ipv4.address }}" \
          --from-literal=http-url="http://{{ ansible_default_ipv4.address }}:{{ nginx_ingress_node_port_http }}" \
          --from-literal=https-url="https://{{ ansible_default_ipv4.address }}:{{ nginx_ingress_node_port_https }}" \
          --namespace={{ nginx_ingress_namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      ignore_errors: yes
      
    - name: Clean up test resources (optional)
      shell: |
        kubectl delete -f /tmp/ingress-test-resource.yml --ignore-not-found=true
        kubectl delete -f /tmp/ingress-test-app.yml --ignore-not-found=true
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      ignore_errors: yes
      when: cleanup_test_resources | default(false)
      
    - name: Save ingress access information
      copy:
        content: |
          # nginx-ingress-controller Access Information
          # Generated on {{ ansible_date_time.iso8601 }}
          
          ## External Access URLs
          HTTP:  http://{{ ansible_default_ipv4.address }}:{{ nginx_ingress_node_port_http }}
          HTTPS: https://{{ ansible_default_ipv4.address }}:{{ nginx_ingress_node_port_https }}
          
          ## Service Details
          Namespace: {{ nginx_ingress_namespace }}
          Service Name: ingress-nginx-controller
          Service Type: {{ ingress_service.spec.type }}
          
          ## NodePort Configuration
          HTTP Port: {{ nginx_ingress_node_port_http }}
          HTTPS Port: {{ nginx_ingress_node_port_https }}
          
          ## Ingress Class
          Default Ingress Class: nginx
          
          ## Health Check
          Health Endpoint: http://{{ ansible_default_ipv4.address }}:{{ nginx_ingress_node_port_http }}/healthz
          
          ## Usage Example
          To create an ingress resource, use:
          ```yaml
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: my-app-ingress
            annotations:
              nginx.ingress.kubernetes.io/rewrite-target: /
          spec:
            ingressClassName: nginx
            rules:
            - host: myapp.local
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: my-app-service
                      port:
                        number: 80
          ```
        dest: /root/ingress-access-info.txt
        mode: '0644'