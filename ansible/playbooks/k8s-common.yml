---
# Common Kubernetes preparation tasks for all nodes
- name: Prepare all nodes for Kubernetes installation
  hosts: k8s_cluster
  become: yes
  gather_facts: yes
  
  vars:
    # Fallback variables in case group_vars are not loaded
    kernel_modules:
      - overlay
      - br_netfilter
    sysctl_params:
      net.bridge.bridge-nf-call-iptables: 1
      net.bridge.bridge-nf-call-ip6tables: 1
      net.ipv4.ip_forward: 1
  
  tasks:
    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600
      register: system_update
      
    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - wget
          - net-tools
          - socat
          - conntrack
        state: present
        
    - name: Disable swap permanently
      block:
        - name: Turn off swap
          shell: swapoff -a
          
        - name: Remove swap entries from /etc/fstab
          lineinfile:
            path: /etc/fstab
            regexp: '.*swap.*'
            state: absent
            
    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop: "{{ kernel_modules }}"
      
    - name: Ensure kernel modules are loaded at boot
      lineinfile:
        path: /etc/modules-load.d/k8s.conf
        line: "{{ item }}"
        create: yes
      loop: "{{ kernel_modules }}"
      
    - name: Configure sysctl parameters for Kubernetes
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: yes
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward", value: "1" }  
    
    # Container Runtime (containerd) Installation
    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
        
    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod 644 /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg
        
    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
        
    - name: Install containerd
      apt:
        name:
          - containerd.io
        state: present
        update_cache: yes
        
    - name: Create containerd configuration directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'
        
    - name: Remove existing containerd configuration
      file:
        path: /etc/containerd/config.toml
        state: absent
        
    - name: Generate fresh containerd configuration
      shell: containerd config default > /etc/containerd/config.toml
      
    - name: Configure containerd to use systemd cgroup driver
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
        
    - name: Restart and enable containerd service
      systemd:
        name: containerd
        enabled: yes
        state: restarted
        daemon_reload: yes
        
    - name: Wait for containerd to be ready
      wait_for:
        path: /var/run/containerd/containerd.sock
        timeout: 30
        
    - name: Configure crictl to use containerd
      copy:
        content: |
          runtime-endpoint: unix:///var/run/containerd/containerd.sock
          image-endpoint: unix:///var/run/containerd/containerd.sock
          timeout: 2
          debug: false
          pull-image-on-create: false
        dest: /etc/crictl.yaml
        mode: '0644'
        
    - name: Verify containerd is working
      shell: ctr version
      register: containerd_version
      retries: 3
      delay: 5
      until: containerd_version.rc == 0
      
    - name: Verify crictl is working
      shell: crictl version
      register: crictl_version
      retries: 3
      delay: 5
      until: crictl_version.rc == 0
      
    - name: Show containerd status for debugging
      shell: systemctl status containerd --no-pager -l
      register: containerd_status_debug
      
    - name: Display containerd status
      debug:
        var: containerd_status_debug.stdout_lines     
   
    # Kubernetes Package Installation
    - name: Add Kubernetes GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        chmod 644 /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        
    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
        state: present
        filename: kubernetes
        
    - name: Install Kubernetes packages
      apt:
        name:
          - kubelet=1.28.2-1.1
          - kubeadm=1.28.2-1.1
          - kubectl=1.28.2-1.1
        state: present
        update_cache: yes
        
    - name: Hold Kubernetes packages to prevent automatic updates
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl
        
    - name: Enable kubelet service
      systemd:
        name: kubelet
        enabled: yes
        daemon_reload: yes
        
    - name: Configure kubelet with node IP
      lineinfile:
        path: /etc/default/kubelet
        line: 'KUBELET_EXTRA_ARGS=--node-ip={{ ansible_default_ipv4.address }}'
        create: yes
      notify: restart kubelet
      
    - name: Create kubectl completion for root
      shell: kubectl completion bash > /etc/bash_completion.d/kubectl
      args:
        creates: /etc/bash_completion.d/kubectl
        
    - name: Verify containerd is running
      systemd:
        name: containerd
        state: started
      register: containerd_status
      
    - name: Display containerd status
      debug:
        msg: "containerd service is {{ containerd_status.status.ActiveState }}"
        
    - name: Verify kubelet is enabled
      systemd:
        name: kubelet
        enabled: yes
      register: kubelet_status
      
    - name: Display kubelet status
      debug:
        msg: "kubelet service is enabled: {{ kubelet_status.enabled }}"
        
  handlers:
    - name: restart kubelet
      systemd:
        name: kubelet
        state: restarted
        daemon_reload: yes