#cloud-config
# Cloud-init configuration for Kubernetes VMs

# System updates and packages
package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common
  - net-tools
  - htop
  - vim
  - git
  - openssh-server

# System configuration
timezone: Europe/Berlin
locale: en_US.UTF-8

# Network configuration
manage_etc_hosts: true

# SSH configuration
ssh_pwauth: true
disable_root: false
ssh_deletekeys: false
ssh_genkeytypes: ['rsa', 'ecdsa', 'ed25519']

# User configuration
users:
  - name: ubuntu
    groups: [adm, cdrom, dip, plugdev, lxd, sudo]
    lock_passwd: false
    passwd: '$6$rounds=4096$saltsalt$L9tjczoIVjNaF.3H.D1KM0cJ3p8QMvXstAK6y6MvMfwIDVkJeMFN4mUcNq8gF5pBtUmvqVukc1VI6cjQYUNVT.'
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ${ssh_public_key}
  - name: root
    lock_passwd: false
    passwd: '$6$rounds=4096$saltsalt$L9tjczoIVjNaF.3H.D1KM0cJ3p8QMvXstAK6y6MvMfwIDVkJeMFN4mUcNq8gF5pBtUmvqVukc1VI6cjQYUNVT.'
    ssh_authorized_keys:
      - ${ssh_public_key}

# SSH daemon configuration
write_files:
  - path: /etc/ssh/sshd_config.d/99-custom.conf
    content: |
      PasswordAuthentication yes
      PubkeyAuthentication yes
      PermitRootLogin yes
      AuthorizedKeysFile .ssh/authorized_keys
    permissions: '0644'

# System tweaks for Kubernetes
bootcmd:
  - echo 'net.bridge.bridge-nf-call-iptables = 1' >> /etc/sysctl.conf
  - echo 'net.bridge.bridge-nf-call-ip6tables = 1' >> /etc/sysctl.conf
  - echo 'net.ipv4.ip_forward = 1' >> /etc/sysctl.conf

# Disable swap (required for Kubernetes)
runcmd:
  - swapoff -a
  - sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
  - modprobe br_netfilter
  - echo 'br_netfilter' >> /etc/modules-load.d/k8s.conf
  - sysctl --system
  - systemctl enable systemd-resolved
  - systemctl start systemd-resolved
  - systemctl restart ssh
  - systemctl enable ssh

# Final reboot to ensure all changes take effect
power_state:
  delay: "+1"
  mode: reboot
  message: "Rebooting after cloud-init setup"
  timeout: 30
  condition: True